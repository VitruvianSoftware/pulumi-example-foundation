# Repository CI — validates the reference foundation codebase itself.
#
# This is NOT the deployment pipeline. The deployment pipeline templates
# (pulumi preview on PRs, pulumi up on merges) live in build/ and
# are copied into the operator's per-stage repositories during onboarding.
# See ONBOARDING.md for details.
#
# Templates:
#   build/pulumi-preview.yml  — runs pulumi preview on PRs
#   build/pulumi-up.yml       — runs pulumi up on merges


name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  build:
    name: "Build: ${{ matrix.stage }}"
    runs-on: ubuntu-latest
    env:
      # Dependencies now resolve from the Go module proxy via tagged
      # versions (go/pkg/*/v0.2.0) — no local replace directives needed.
      GOWORK: "off"
      GONOSUMCHECK: "github.com/VitruvianSoftware/*"
      GONOSUMDB: "github.com/VitruvianSoftware/*"
      GOPRIVATE: "github.com/VitruvianSoftware/*"
    strategy:
      fail-fast: false
      matrix:
        stage:
          - 0-bootstrap
          - 1-org
          - 2-environments
          - 3-networks-hub-and-spoke
          - 3-networks-svpc
          - 4-projects
          - 5-app-infra
    steps:
      - name: Checkout foundation
        uses: actions/checkout@v4

      - name: Configure Go private modules
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.stage }}/go.mod
          cache-dependency-path: ${{ matrix.stage }}/go.sum

      - name: Tidy
        working-directory: ${{ matrix.stage }}
        run: go mod tidy

      - name: Vet
        working-directory: ${{ matrix.stage }}
        run: go vet ./...

      - name: Build
        working-directory: ${{ matrix.stage }}
        run: go build ./...

      - name: Test
        working-directory: ${{ matrix.stage }}
        run: go test ./... -race -count=1
